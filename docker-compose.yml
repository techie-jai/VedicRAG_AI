services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-server
    ports:
      - "11435:11435"
    volumes:
      - ollama_data:/root/.ollama
      - C:\Users\Jaikm\.ollama\models:/root/.ollama/models
    networks:
      - nalanda-network
    environment:
      - OLLAMA_HOST=0.0.0.0:11435
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:11435/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  chroma:
    image: chromadb/chroma:latest
    container_name: chroma-db
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - nalanda-network
    depends_on:
      - ollama

  fastapi:
    build: .
    container_name: nalanda-api
    ports:
      - "8080:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11435
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
    depends_on:
      - chroma
    volumes:
      - ./data:/app/data
      - ./dharmaganj:/app/dharmaganj
    networks:
      - nalanda-network

volumes:
  chroma_data:
  ollama_data:

networks:
  nalanda-network:
    driver: bridge